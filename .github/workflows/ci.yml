name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # eslint + tsc (see package.json "lint")
      - name: Lint & typecheck
        run: npm run lint

      # vitest, node project — pure-logic units: geometry/orbit invariants, anim math,
      # determinism guard, mesh topology, part contracts, material invariants. No rendering.
      - name: Unit tests
        run: npm test

  # Everything above is CPU-cheap and runs on every push. Everything below actually renders, so
  # it lives in a second job: slower, but it is the only thing that can catch a visual regression.
  #
  # Until now this job did not exist, and docs/TESTING.md's "CI tiering" table described an
  # intention rather than reality — a PR could change a shipped video's pixels, break a model's
  # silhouette or invalidate a GLB and CI would stay green.
  #
  # `--gl=swangle` is not optional here: GitHub runners have no GPU, angle fails outright, and
  # SwiftShader-on-ANGLE is deterministic across machines, which is what makes a committed golden
  # baseline meaningful at all.
  visual-checks:
    name: Render self-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Remotion drives headless Chromium; the runner image needs its shared libraries.
      - name: Install Chromium dependencies
        run: npx remotion browser ensure

      # glTF validation + metadata fixtures for the Blender-authored assets.
      - name: 3D assets
        run: npm run check-assets

      # Shipped compositions vs their committed golden frames. A drift here means a promo that
      # already went out now renders differently.
      #
      # The flags MUST match the ones the baselines were accepted with: check-render picks its
      # sample frames from --frames/--trim, so a different trim asks for frames that have no
      # golden and the comparison silently degrades to a SKIP. --trim 60 also clears Lumo's
      # opening fade, which is dark enough that content-check reads it as an empty frame.
      # 2D compositions re-render across platforms almost exactly: this runner scored 0.9989 and
      # 0.9993 against baselines captured on Windows. Full tolerance applies.
      - name: Golden frames — 2D promos
        run: |
          npm run check-render LumoPromo -- --frames 5 --trim 60
          npm run check-render JumperPromo -- --frames 5 --trim 60
          npm run check-render LevelUpCreative -- --frames 5 --trim 60

      # 3D does NOT: ShotikPromo scored 0.9243 here against the same Windows baseline, with the GL
      # renderer already pinned to swangle. Rasterising a 3D scene is not bit-identical across
      # SwiftShader builds, so the gate is loosened for these two rather than for everything —
      # 0.90 still catches a real look change while tolerating cross-platform noise. Tight 3D
      # comparison stays a local job, where baseline and candidate share a machine.
      - name: Golden frames — 3D promos (cross-platform tolerance)
        run: |
          npm run check-render ShotikPromo -- --frames 5 --trim 60 --min-ssim 0.90
          npm run check-render BybitCardGif -- --frames 5 --trim 60 --min-ssim 0.90

      # Procedural models: silhouette, flatness, depth and regression against accepted baselines.
      # The phone declares a looser depth floor because a handset really is that thin — a gate
      # nobody ever argues with is a gate that measures nothing.
      - name: Model fidelity
        run: |
          npm run check-fidelity LaptopFactoryBench -- --views front=0,quarter=15,side=30 --regression-min-ssim 0.90
          npm run check-fidelity GamepadBench -- --views front=0,quarter=15,side=30 --regression-min-ssim 0.90
          npm run check-fidelity PhoneBench -- --views front=0,quarter=15,side=30 --min-depth-ratio 0.1 --regression-min-ssim 0.90
