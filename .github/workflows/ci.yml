name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # eslint + tsc (see package.json "lint")
      - name: Lint & typecheck
        run: npm run lint

      # vitest, node project — pure-logic units: geometry/orbit invariants,
      # anim math, determinism guard, scene-graph smoke. No rendering needed.
      - name: Unit tests
        run: npm test
